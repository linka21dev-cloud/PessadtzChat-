<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PessadtzChat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--primary:#00ff88;--bg:#070707;--card:#111111aa;--topbar:#0d0d0d;--text:#e0e0e0}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;background-image: radial-gradient(circle at 20% 20%, #00ff8811 0%, transparent 50%);}

 .topbar{height:60px;background:var(--topbar);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 16px;gap:14px;position:sticky;top:0;z-index:50;border-bottom:1px solid #222}
 .topbar h1{font-size:19px;font-weight:600;flex:1;letter-spacing:0.5px}
 .topbar span{font-size:22px;cursor:pointer}

 .sidebar{position:fixed;left:-320px;top:0;width:320px;height:100%;background:#0a0a0aee;backdrop-filter:blur(20px);z-index:100;transition:0.4s cubic-bezier(.2,.8,.2,1);padding:24px;overflow-y:auto;border-right:1px solid #222}
 .sidebar.open{left:0}
 .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000d;display:none;z-index:99;backdrop-filter:blur(4px)}
 .overlay.show{display:block}
 .menu-item{padding:14px 0;border-bottom:1px solid #1a1a1a}
 .menu-item label{display:block;margin-bottom:8px;font-size:13px;color:#aaa;font-weight:300}
 .menu-item input[type="text"],.menu-item input[type="password"]{width:100%;padding:12px;background:#1a1a1a;border:1px solid #2a2a2a;color:var(--text);border-radius:10px;outline:none;transition:0.2s}
 .menu-item input:focus{border:1px solid var(--primary)}
 .menu-item input[type="color"]{width:100%;height:45px;border:none;border-radius:10px;cursor:pointer}

 .tabs{display:flex;background:var(--topbar);backdrop-filter:blur(10px);position:sticky;top:60px;z-index:40;border-bottom:1px solid #222}
 .tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:400;position:relative;color:#888}
 .tab.active{color:var(--primary)}
 .tab.active::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:2px;background:var(--primary);border-radius:2px}

 .page{display:none;height:calc(100vh - 60px - 52px)}
 .page.active{display:block}
  #chatList{height:100%;overflow-y:auto;padding:12px}
 .chat-item{padding:14px;background:var(--card);backdrop-filter:blur(10px);margin-bottom:10px;border-radius:14px;cursor:pointer;border:1px solid #222;transition:0.2s}
 .chat-item:hover{background:#1a1a1a}

  #chatBox{height:calc(100vh - 60px - 70px);overflow-y:auto;padding:14px;background:transparent;padding-bottom:80px}
 .msg{max-width:78%;padding:12px 16px;margin:10px 0;border-radius:16px;clear:both;word-wrap:break-word;font-size:14px;line-height:1.5}
 .msg b{display:block;font-size:12px;margin-bottom:4px;color:var(--primary)}
 .msg.me{background:linear-gradient(135deg,#00ff88,#00cc6a);color:#000;float:right;border-bottom-right-radius:4px}
 .msg.other{background:var(--card);backdrop-filter:blur(10px);float:left;border:1px solid #222;border-bottom-left-radius:4px}
 .msg img,.msg video{max-width:240px;border-radius:12px;margin-top:8px}

 .chat-input{position:fixed;bottom:0;left:0;width:100%;display:flex;padding:10px 12px;background:#0d0d0dee;backdrop-filter:blur(15px);gap:10px;align-items:center;border-top:1px solid #222}
 .chat-input input{flex:1;padding:13px 18px;border-radius:25px;border:1px solid #2a2a2a;background:#1a1a1a;color:var(--text);outline:none}
 .chat-input button{padding:13px 15px;border:none;background:var(--primary);border-radius:50%;color:#000;cursor:pointer;font-size:18px;font-weight:600}
 .chat-input span{font-size:20px;cursor:pointer;padding:5px}

 .status-list{padding:12px;height:100%;overflow-y:auto}
 .status-item{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card);backdrop-filter:blur(10px);margin-bottom:10px;border-radius:14px;border:1px solid #222}
 .status-item img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);padding:2px}
 .footer{padding:24px;text-align:center;font-size:11px;color:#555}
 .btn-save{width:100%;padding:14px;background:linear-gradient(135deg,#00ff88,#00cc6a);border:none;border-radius:12px;color:#000;font-weight:600;margin-top:12px;cursor:pointer;font-size:15px}
</style>
</head>
<body>

<div class="topbar">
  <span onclick="toggleSidebar()">☰</span>
  <h1 id="logo">PessadtzChat</h1>
  <span onclick="goHome()">🏠</span>
</div>

<div class="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <h3 style="margin-bottom:20px;font-weight:600">Pengaturan</h3>
  <div class="menu-item"><label>Akun Email</label><input id="email" type="text" placeholder="email kamu"></div>
  <div class="menu-item"><label>Password</label><input id="pass" type="password" placeholder="set password"></div>
  <div class="menu-item"><label>Nama Profil</label><input id="nama" type="text" placeholder="Nama kamu"></div>
  <div class="menu-item"><label>Foto Profil</label><input type="file" id="fotoProfil" accept="image/*"><img id="previewFoto" style="width:70px;height:70px;border-radius:50%;margin-top:10px;display:none;border:2px solid var(--primary)"></div>
  <div class="menu-item"><label>Warna Background</label><input type="color" id="bgColor" value="#070707"></div>
  <div class="menu-item"><label>Warna Topbar</label><input type="color" id="topColor" value="#0d0d0d"></div>
  <div class="menu-item"><label>Warna Teks/Accent</label><input type="color" id="textColor" value="#00ff88"></div>
  <div class="menu-item"><label>Tambah Kontak ID</label><input id="addContact" type="text" placeholder="ID Kontak"><button class="btn-save" onclick="tambahKontak()">Tambah Kontak</button></div>
  <button class="btn-save" onclick="simpanProfil()">Simpan Pengaturan</button>
  <div class="menu-item" style="font-size:13px">Versi: 1.0.1 Elegan<br>Lisensi: Link-a21 Development 2026</div>
  <div class="footer">©Link-a21 development. Web App | agency | independent. 2026</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="openTab('chat')">Pesan</div>
  <div class="tab" onclick="openTab('status')">Status</div>
</div>

<div id="chat" class="page active">
  <div id="chatList"><div class="chat-item" onclick="bukaChat('chat_umum')">🔥 Grup Umum Pessadtz</div></div>
  <div id="chatBox" style="display:none"></div>
  <div class="chat-input" id="chatInput" style="display:none">
    <span onclick="document.getElementById('fileUpload').click()">📎</span>
    <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
    <input id="pesan" placeholder="Ketik pesan elegan..." onfocus="scrollKeBawah()">
    <button onclick="kirim()">➤</button>
  </div>
</div>

<div id="status" class="page">
  <button onclick="document.getElementById('statusUpload').click()" style="margin:12px;padding:14px;width:calc(100% - 24px);background:linear-gradient(135deg,#00ff88,#00cc6a);border:none;border-radius:14px;color:#000;font-weight:600">+ Upload Status</button>
  <input type="file" id="statusUpload" accept="image/*,video/*" style="display:none">
  <div class="status-list" id="statusList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onChildAdded, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZ5X6Z-V8zfDRZ1oJQTyeElAaoeha52Eg",
  authDomain: "pessadtzchat.firebaseapp.com",
  databaseURL: "https://pessadtzchat-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pessadtzchat",
  storageBucket: "pessadtzchat.firebasestorage.app",
  messagingSenderId: "434720605172",
  appId: "1:434720605172:web:86b575d150d6b161d1efa1",
  measurementId: "G-05QGZPGR6F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);
let currentUser = "User_"+Math.floor(Math.random()*1000);
let currentChat = "chat_umum";
let userId = localStorage.getItem('uid') || Date.now(); localStorage.setItem('uid', userId);

signInAnonymously(auth).then(()=>{loadChat(); loadProfil(); loadStatus();});

// SIDEBAR + TEMA
window.toggleSidebar = ()=>{document.getElementById('sidebar').classList.toggle('open');document.querySelector('.overlay').classList.toggle('show')}
window.openTab = (t)=>{document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById(t).classList.add('active');event.target.classList.add('active')}
['bgColor','topColor','textColor'].forEach(id=>{
  document.getElementById(id).oninput=e=>{
    document.documentElement.style.setProperty('--bg', id=='bgColor'?e.target.value:'');
    document.documentElement.style.setProperty('--topbar', id=='topColor'?e.target.value:'');
    document.documentElement.style.setProperty('--primary', id=='textColor'?e.target.value:'');
    localStorage.setItem(id, e.target.value);
  }
  document.getElementById(id).value = localStorage.getItem(id) || document.getElementById(id).value;
  document.getElementById(id).dispatchEvent(new Event('input'));
})

// SIMPAN PROFIL
window.simpanProfil = async ()=>{
  let nama = document.getElementById('nama').value;
  let email = document.getElementById('email').value;
  let file = document.getElementById('fotoProfil').files[0];
  let fotoURL = "";
  if(file){
    const storageRef = sRef(storage, 'profil/'+userId+'_'+file.name);
    await uploadBytes(storageRef, file);
    fotoURL = await getDownloadURL(storageRef);
    document.getElementById('previewFoto').src=fotoURL;document.getElementById('previewFoto').style.display='block';
  }
  set(ref(db, 'users/'+userId), {nama, email, foto:fotoURL});
  localStorage.setItem('nama', nama); currentUser = nama || currentUser;
  alert('✅ Profil tersimpan');
}
function loadProfil(){
  get(child(ref(db), 'users/'+userId)).then(snap=>{
    if(snap.exists()){
      let d=snap.val();
      document.getElementById('nama').value = d.nama || '';
      document.getElementById('email').value = d.email || '';
      if(d.foto){document.getElementById('previewFoto').src=d.foto;document.getElementById('previewFoto').style.display='block'; currentUser=d.nama}
    }
  })
}

// CHAT
function loadChat(){
  onChildAdded(ref(db, currentChat), snap=>{
    const m=snap.val();
    let content = m.text || '';
    if(m.file) content += `<br>${m.file.includes('.mp4')?`<video src="${m.file}" controls></video>`:`<img src="${m.file}">`}`;
    document.getElementById('chatBox').innerHTML += `<div class="msg ${m.user==currentUser?'me':'other'}"><b>${m.user}</b>${content}</div>`;
    scrollKeBawah();
  })
}
window.bukaChat = (id)=>{
  currentChat = id;
  document.getElementById('chatList').style.display='none';
  document.getElementById('chatBox').style.display='block';
  document.getElementById('chatInput').style.display='flex';
  document.getElementById('chatBox').innerHTML='';
  loadChat(); toggleSidebar(); history.pushState({page:'chat'},'','');
}
window.goHome = ()=>{
  document.getElementById('chatBox').style.display='none';
  document.getElementById('chatInput').style.display='none';
  document.getElementById('chatList').style.display='block';
}
function scrollKeBawah(){setTimeout(()=>{document.getElementById('chatBox').scrollTop = 99999},100);}
window.kirim = async ()=>{
  let txt = document.getElementById('pesan').value;
  let file = document.getElementById('fileUpload').files[0];
  let fileURL = "";
  if(file){
    const storageRef = sRef(storage, 'files/'+Date.now()+'_'+file.name);
    await uploadBytes(storageRef, file);
    fileURL = await getDownloadURL(storageRef);
  }
  if(txt || fileURL){
    push(ref(db, currentChat), {user:currentUser, text:txt, file:fileURL, time:Date.now()});
    document.getElementById('pesan').value=""; scrollKeBawah();
  }
}

// STATUS
document.getElementById('statusUpload').onchange = async e=>{
  let file = e.target.files[0];
  const storageRef = sRef(storage, 'status/'+Date.now()+'_'+file.name);
  await uploadBytes(storageRef, file);
  let url = await getDownloadURL(storageRef);
  push(ref(db,'status'),{user:currentUser, file:url, time:Date.now()});
}
function loadStatus(){
  onChildAdded(ref(db,'status'), snap=>{
    const s=snap.val();
    document.getElementById('statusList').innerHTML += `<div class="status-item"><img src="${s.file}"><div><b>${s.user}</b><br><span style="font-size:12px;color:#888">Baru saja</span></div></div>`;
  })
}

// KONTAK + BACK BUTTON
window.tambahKontak = ()=>{let id = document.getElementById('addContact').value; if(id) set(ref(db, 'kontak/'+userId+'/'+id), true); alert('Permintaan terkirim');}
window.addEventListener('popstate', ()=>{goHome();})
</script>
</body>
</html>
